name: apphotel_valonia
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter_native_splash: ^2.4.6
  flutter:
    sdk: flutter
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^14.0.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  http: ^1.4.0
  provider: ^6.1.1
  jwt_decoder: ^2.0.1
  shared_preferences: ^2.5.3
  cloudinary_public: ^0.23.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
  assets:
    - assets/fonts/Roboto-Regular.ttf
    - assets/images/native-logo.png
    - assets/images/logo.png
    - assets/images/onboarding1.png
    - assets/images/onboarding2.png
    - assets/images/get-started.png
    - assets/images/view1.png
    - assets/images/view2.png
    - assets/images/room-view1.png
    - assets/images/room-view2.png
    - assets/images/profile-user-default.png
    - assets/images/hotel.jpg
    - assets/images/room.jpg
    - assets/images/profil-valonia.png
    - assets/images/gopay.png
    - assets/images/dana.png
    - assets/images/shopeepay.png
  uses-material-design: true
